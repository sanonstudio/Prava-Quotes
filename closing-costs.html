<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Seller-Paid Closing Costs — VRE</title>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@700;800;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: #03091A;
  font-family: "Poppins", sans-serif;
  color: #fff;
}
#bg-canvas, #sparkle-canvas {
  position: fixed; inset: 0; pointer-events: none;
}
#bg-canvas      { z-index: 0; }
#sparkle-canvas { z-index: 3; }
:root { --footer-h: 148px; --mascot-nudge: 20px; }
.slide {
  position: fixed; inset: 0; z-index: 1;
  display: flex; flex-direction: column;
  justify-content: center; align-items: flex-start;
  padding: 80px 120px;
  padding-bottom: calc(var(--footer-h) + 40px);
  width: 58%;
  opacity: 0;
  transition: opacity 0.7s ease;
  text-align: left;
}
.slide.active { opacity: 1; }
.slide-mascot {
  position: fixed;
  right: 80px;
  bottom: calc(var(--footer-h) - var(--mascot-nudge));
  width: 42%; z-index: 2;
  display: flex; align-items: flex-end; justify-content: center;
  will-change: transform; transform: translateZ(0);
}
.slide-mascot img {
  width: 100%;
  max-height: calc(100vh - var(--footer-h) - 60px);
  object-fit: contain; object-position: bottom;
  filter: drop-shadow(0 0 40px rgba(1,91,187,0.4));
  display: block;
}
.month-label {
  font-family: "League Spartan", sans-serif;
  font-size: clamp(22px, 2.4vw, 36px);
  font-weight: 700; letter-spacing: 8px;
  text-transform: uppercase; color: #FFD700;
  margin-bottom: 18px;
}
.headline {
  font-family: "League Spartan", sans-serif;
  font-size: clamp(48px, 6.5vw, 100px);
  font-weight: 900; text-transform: uppercase;
  line-height: 1; color: #fff; margin-bottom: 12px;
}
.amount-wrap { position: relative; display: inline-block; margin: 4px 0 16px; }
.amount {
  font-family: "League Spartan", sans-serif;
  font-size: clamp(64px, 11.5vw, 190px);
  font-weight: 900; line-height: 1; color: #FFD700;
  text-shadow:
    0 0 40px rgba(255,215,0,0.9),
    0 0 80px rgba(255,215,0,0.5),
    0 0 160px rgba(255,190,0,0.3);
  display: block;
  animation: goldPulse 3s ease-in-out infinite;
}
@keyframes goldPulse {
  0%,100% { text-shadow: 0 0 40px rgba(255,215,0,0.9), 0 0 80px rgba(255,215,0,0.5), 0 0 160px rgba(255,190,0,0.3); }
  50%      { text-shadow: 0 0 60px rgba(255,215,0,1.0), 0 0 120px rgba(255,215,0,0.7), 0 0 240px rgba(255,190,0,0.5); }
}
.subline {
  font-family: "League Spartan", sans-serif;
  font-size: clamp(36px, 5vw, 76px);
  font-weight: 900; text-transform: uppercase;
  line-height: 1; color: #fff;
}
.ytd-strip {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 4;
  background: rgba(1,91,187,0.30);
  border-top: 2px solid rgba(1,91,187,0.6);
  /* right padding reserves the corner-logo zone (120px offset + 420px logo)
     so the label/amount can never run underneath it on narrower screens */
  padding: 28px 560px 28px 120px;
  display: flex; align-items: center; gap: 36px;
}
.ytd-label {
  font-family: "League Spartan", sans-serif;
  font-size: clamp(18px, 2vw, 30px);
  font-weight: 700; letter-spacing: 4px;
  text-transform: uppercase; color: #fff;
}
.ytd-amount {
  font-family: "League Spartan", sans-serif;
  font-size: clamp(32px, 4vw, 60px);
  font-weight: 900; color: #FFD700; letter-spacing: 1px;
}
.ytd-divider { width: 1px; height: 44px; background: rgba(255,255,255,0.25); }
.logo-corner {
  position: fixed;
  bottom: 32px; right: 120px;
  z-index: 5;
  width: 420px;
  opacity: 0.90;
}
.logo-corner img { width: 100%; display: block; }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<canvas id="sparkle-canvas"></canvas>
<div id="app"></div>
<div class="logo-corner">
  <img src="https://lh3.googleusercontent.com/d/1G4nSxFHfV5OpdCyt67u0R7bhf2jW97Uc" alt="VRE Logo">
</div>
<div class="ytd-strip">
  <div class="ytd-label" id="ytd-label">Loading&hellip;</div>
  <div class="ytd-divider"></div>
  <div class="ytd-amount" id="ytd-amount">&nbsp;</div>
</div>
<script>
// ── Live data source ──────────────────────────────────────────────────────────
// JSON endpoint on the Leaderboard v2 web app (same GAS project, same
// OpChamp Master Data `commissions` mirror = Crystal's Deal Log = what
// OpChamp shows). Buyer-side, non-rental CC credits, current-year closes —
// the exact rows the Negotiators leaderboard ranks.
// Paste the Leaderboard v2 deployment URL (ends in /exec) below.
var LEADERBOARD_EXEC_URL = 'https://script.google.com/macros/s/AKfycbwAxsh5OcCUuypHkSS3MZPWhBMTvBOaibPYplpz03cpvTXIzR-xKIPQYw0-MQyx6AT7Og/exec';
var DATA_URL = LEADERBOARD_EXEC_URL + '?data=cctotals';
// Auto-reload interval — keeps the TV screen current without manual refresh
var RELOAD_MS = 30 * 60 * 1000; // 30 minutes

function fmtDollar(n) {
  return '$' + Math.round(n).toLocaleString('en-US');
}
// ── Pick display values out of the endpoint JSON ─────────────────────────────
// { ok, year, months:[{label:"January 2026", cc:12345} ×12], ytdCC, updated }
function extractData(json) {
  var result = { monthLabel: '', monthCC: 0, ytdCC: 0, year: new Date().getFullYear() };
  if (!json || !json.ok) return result;
  result.year  = json.year || result.year;
  result.ytdCC = +json.ytdCC || 0;
  // Use the last month that actually has data (cc > 0) — skips current month if not yet closed
  var filled = (json.months || []).filter(function(m) { return (+m.cc || 0) > 0; });
  if (filled.length > 0) {
    var latest = filled[filled.length - 1];
    result.monthLabel = latest.label;
    result.monthCC    = +latest.cc || 0;
  }
  return result;
}
// ── Animated counter ──────────────────────────────────────────────────────────
function countUp(el, target, duration) {
  var start = null;
  function step(ts) {
    if (!start) start = ts;
    var p = Math.min((ts - start) / duration, 1);
    var eased = 1 - Math.pow(1 - p, 3);
    el.textContent = '$' + Math.round(eased * target).toLocaleString('en-US');
    if (p < 1) requestAnimationFrame(step);
    else { el.textContent = '$' + target.toLocaleString('en-US'); fireSparkles(); }
  }
  requestAnimationFrame(step);
}
// ── Build the slide with real data ────────────────────────────────────────────
function buildSlide(data) {
  var app = document.getElementById('app');
  app.innerHTML = '';
  var div = document.createElement('div');
  div.className = 'slide';
  div.innerHTML =
    '<div class="month-label">' + data.year + ' &middot; Year to Date</div>' +
    '<div class="headline">We saved our<br>homebuyers</div>' +
    '<div class="amount-wrap"><span class="amount" id="counter">$0</span></div>' +
    '<div class="subline">in seller-paid<br>closing costs</div>';
  app.appendChild(div);
  // Mascot outside the slide so counter repaints never shake it
  if (!document.querySelector('.slide-mascot')) {
    var mascot = document.createElement('div');
    mascot.className = 'slide-mascot';
    mascot.innerHTML = '<img src="https://lh3.googleusercontent.com/d/1oG_L7edU7xF5PM-7VMIXwNKOHPbW_R3p" alt="Bison mascot">';
    document.body.appendChild(mascot);
  }
  // Footer — latest closed month (the big number above is the YTD total)
  if (data.monthLabel) {
    document.getElementById('ytd-label').textContent =
      data.monthLabel + ' Seller-Paid Closing Costs';
    document.getElementById('ytd-amount').textContent = fmtDollar(data.monthCC);
  } else {
    document.getElementById('ytd-label').textContent =
      data.year + ' Season';
    document.getElementById('ytd-amount').textContent = '';
  }
  // Animate in
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      div.classList.add('active');
      setTimeout(function() {
        var el = div.querySelector('#counter');
        if (el) countUp(el, data.ytdCC, 2200);
      }, 300);
    });
  });
}
// ── Load data then build ──────────────────────────────────────────────────────
fetch(DATA_URL)
  .then(function(r) { return r.json(); })
  .then(function(json) {
    buildSlide(extractData(json));
  })
  .catch(function(err) {
    console.error('Failed to load data:', err);
    // Fallback: show a placeholder so the screen isn't blank
    buildSlide({ monthLabel: 'Data unavailable', monthCC: 0, ytdCC: 0, year: new Date().getFullYear() });
  });
// ── Auto-reload to pick up new monthly data ───────────────────────────────────
setTimeout(function() { location.reload(); }, RELOAD_MS);
// ── Animated background ───────────────────────────────────────────────────────
(function initBg() {
  var canvas = document.getElementById('bg-canvas');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  var ctx = canvas.getContext('2d'), t = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#03091A'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    var ox1 = canvas.width * 0.78 + Math.sin(t * 0.4) * 60;
    var oy1 = canvas.height * 0.25 + Math.cos(t * 0.3) * 40;
    var g1  = ctx.createRadialGradient(ox1, oy1, 0, ox1, oy1, 520);
    g1.addColorStop(0, 'rgba(1,91,187,0.28)'); g1.addColorStop(1, 'transparent');
    ctx.fillStyle = g1; ctx.fillRect(0, 0, canvas.width, canvas.height);
    var ox2 = canvas.width * 0.15 + Math.cos(t * 0.25) * 50;
    var oy2 = canvas.height * 0.75 + Math.sin(t * 0.35) * 50;
    var g2  = ctx.createRadialGradient(ox2, oy2, 0, ox2, oy2, 380);
    g2.addColorStop(0, 'rgba(180,130,0,0.14)'); g2.addColorStop(1, 'transparent');
    ctx.fillStyle = g2; ctx.fillRect(0, 0, canvas.width, canvas.height);
    t += 0.008; requestAnimationFrame(draw);
  }
  draw();
})();
// ── Sparkles ──────────────────────────────────────────────────────────────────
var sC = document.getElementById('sparkle-canvas');
sC.width = window.innerWidth; sC.height = window.innerHeight;
var sCtx = sC.getContext('2d'), sparkles = [];
function fireSparkles() {
  var ox = window.innerWidth * 0.38, oy = window.innerHeight * 0.46;
  for (var i = 0; i < 80; i++) {
    var angle = Math.random() * Math.PI * 2, speed = Math.random() * 6 + 2;
    sparkles.push({
      x: ox + (Math.random() - 0.5) * 400,
      y: oy + (Math.random() - 0.5) * 120,
      vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - Math.random() * 3,
      size: Math.random() * 5 + 2, life: 1,
      decay: Math.random() * 0.018 + 0.008,
      color: Math.random() < 0.6 ? '#FFD700' : (Math.random() < 0.5 ? '#FFF8DC' : '#015BBB')
    });
  }
}
(function seedAmbient() {
  for (var i = 0; i < 30; i++) {
    sparkles.push({
      x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight,
      vx: (Math.random() - 0.5) * 0.4, vy: -(Math.random() * 0.5 + 0.2),
      size: Math.random() * 2 + 0.5, life: Math.random(),
      decay: Math.random() * 0.003 + 0.001,
      color: Math.random() < 0.7 ? 'rgba(255,215,0,0.6)' : 'rgba(255,255,255,0.4)',
      ambient: true
    });
  }
})();
(function drawSparkles() {
  sCtx.clearRect(0, 0, sC.width, sC.height);
  for (var i = sparkles.length - 1; i >= 0; i--) {
    var s = sparkles[i];
    s.x += s.vx; s.y += s.vy;
    if (!s.ambient) s.vy += 0.12;
    s.life -= s.decay;
    if (s.life <= 0) {
      if (s.ambient) {
        s.x = Math.random() * sC.width; s.y = sC.height + 10;
        s.life = Math.random() * 0.5 + 0.3;
      } else { sparkles.splice(i, 1); continue; }
    }
    sCtx.save();
    sCtx.globalAlpha = s.life * (s.ambient ? 0.5 : 1);
    sCtx.fillStyle = s.color;
    if (!s.ambient && s.size > 4) {
      sCtx.translate(s.x, s.y); sCtx.rotate(s.life * 4); sCtx.beginPath();
      for (var j = 0; j < 4; j++) {
        var a = (j / 4) * Math.PI * 2, r = j % 2 === 0 ? s.size : s.size * 0.4;
        j === 0 ? sCtx.moveTo(Math.cos(a)*r, Math.sin(a)*r) : sCtx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
      }
      sCtx.closePath(); sCtx.fill();
    } else {
      sCtx.beginPath(); sCtx.arc(s.x, s.y, s.size * s.life, 0, Math.PI * 2); sCtx.fill();
    }
    sCtx.restore();
  }
  requestAnimationFrame(drawSparkles);
})();
window.addEventListener('resize', function() {
  sC.width = window.innerWidth; sC.height = window.innerHeight;
  var b = document.getElementById('bg-canvas');
  b.width = window.innerWidth; b.height = window.innerHeight;
});
</script>
</body>
</html>
