#slide-stack{position:fixed;inset:0}
.sale-slide{position:absolute;inset:0;opacity:0;transition:opacity 1.2s ease;overflow:hidden}
.sale-slide.active{opacity:1}
.slide-photo{position:absolute;inset:0;background-size:cover;background-position:center;transform-origin:center center;animation:kenBurns 10s ease-in-out forwards;animation-play-state:paused}
.sale-slide.active .slide-photo{animation-play-state:running}
@keyframes kenBurns{0%{transform:scale(1) translateX(0) translateY(0)}100%{transform:scale(1.07) translateX(-1%) translateY(-1%)}}
.slide-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(1,10,35,0.97) 0%,rgba(1,10,35,0.82) 30%,rgba(1,10,35,0.35) 65%,rgba(0,0,0,0.15) 100%),linear-gradient(to right,rgba(1,10,35,0.6) 0%,transparent 50%)}
.slide-content{position:absolute;bottom:0;left:0;right:0;padding:0 56px 104px;z-index:10;text-align:left}
.sold-header{display:flex;align-items:center;gap:28px;justify-content:flex-start;margin-bottom:20px}
.sold-label{display:inline-block;font-size:clamp(18px,2vw,26px);font-weight:900;letter-spacing:6px;text-transform:uppercase;color:#fff;background:#C9302C;padding:6px 22px 4px}
.sold-date{font-size:clamp(16px,1.8vw,24px);font-weight:500;color:rgba(255,255,255,0.7);letter-spacing:0.5px}
.sale-price{font-size:clamp(80px,12vw,160px);font-weight:900;line-height:1;color:#FFD700;letter-spacing:-2px;margin-bottom:16px}
.sale-address{font-size:clamp(40px,5.5vw,72px);font-weight:700;line-height:1.1;color:#fff;margin-bottom:6px}
.sale-city{font-size:clamp(32px,4vw,54px);font-weight:400;color:rgba(255,255,255,0.6);margin-bottom:28px}
.sale-meta{display:flex;align-items:center;gap:0;flex-wrap:wrap;margin-bottom:26px}
.meta-pill{font-size:clamp(18px,2.2vw,28px);font-weight:500;color:rgba(255,255,255,0.6);padding-right:28px;margin-right:28px;border-right:1px solid rgba(255,255,255,0.2)}
.meta-pill:last-child{border-right:none;padding-right:0;margin-right:0}
.sale-agent-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.sale-agent{font-size:clamp(24px,3vw,42px);font-weight:700;color:#fff;letter-spacing:0.5px}
.role-tag{display:inline-block;font-size:clamp(12px,1.2vw,16px);font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.55);margin-bottom:4px}
.slide-logo{position:absolute;bottom:104px;right:56px;z-index:10;opacity:0.85}
.slide-logo img{height:clamp(54px,6vw,84px);width:auto;display:block}
.progress-dots{position:absolute;bottom:48px;right:56px;display:flex;gap:8px;z-index:10}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.25);transition:background 0.4s,transform 0.4s}
.dot.active{background:#FFD700;transform:scale(1.4)}
.ticker-bar{position:fixed;bottom:0;left:0;right:0;height:84px;background:rgba(1,91,187,0.95);backdrop-filter:blur(10px);display:flex;align-items:center;overflow:hidden;z-index:20}
.ticker-label{flex-shrink:0;background:#FFD700;color:#010f2a;font-size:20px;font-weight:900;letter-spacing:4px;padding:0 36px;height:100%;display:flex;align-items:center}
.ticker-track{flex:1;overflow:hidden;position:relative}
.ticker-inner{display:flex;gap:0;white-space:nowrap;animation:tickerScroll 30s linear infinite}
.ticker-item{font-size:26px;font-weight:500;color:rgba(255,255,255,0.95);padding:0 60px;letter-spacing:0.3px}
.ticker-item span{color:#FFD700;font-weight:700}
@keyframes tickerScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.preview-controls{position:fixed;top:8px;right:8px;z-index:200;display:flex;gap:6px;background:rgba(0,0,0,0.7);padding:6px 10px;border-radius:8px}
.preview-controls button{background:rgba(255,255,255,0.15);color:#fff;border:none;padding:5px 12px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer}
.preview-controls button:hover{background:rgba(255,255,255,0.3)}

    if (sale.beds) metaParts.push(sale.beds + ' Beds');
    if (sale.baths_str) metaParts.push(sale.baths_str + ' Baths');
    if (sale.sqft) metaParts.push(sale.sqft + ' Sq Ft');
    if (sale.year_built) metaParts.push('Built ' + sale.year_built);
    var metaHtml = metaParts.map(function(p){ return '<div class="meta-pill">' + p + '</div>'; }).join('');
    var roleHtml = sale.role ? '<div class="role-tag">' + sale.role + '</div>' : '';
    var agentHtml = '';
    if (sale.has_agent) agentHtml = '<div class="sale-agent-row"><div class="sale-agent">' + sale.agent + '</div>' + bothBadge + '</div>';
    else if (bothBadge) agentHtml = '<div class="sale-agent-row">' + bothBadge + '</div>';
    slide.innerHTML =
      '<div class="slide-photo" style="background-image:url(\'' + sale.photo + '\')"></div>' +
      '<div class="slide-overlay"></div>' +
      '<div class="slide-content">' +
        '<div class="sold-header"><div class="sold-label">Sold</div><div class="sold-date">' + sale.date + '</div></div>' +
        '<div class="sale-price">' + sale.price + '</div>' +
        '<div class="sale-address">' + sale.address + '</div>' +
        '<div class="sale-city">' + sale.city + '</div>' +
        '<div class="sale-meta">' + metaHtml + '</div>' +
        roleHtml + agentHtml +
      '</div>' +
      '<div class="slide-logo"><img src="https://drive.google.com/thumbnail?id=1G4nSxFHfV5OpdCyt67u0R7bhf2jW97Uc&sz=w400" alt="VRE"></div>' +
      '<div class="progress-dots">' + SALES.map(function(_, j){ return '<div class="dot' + (j === i ? ' active' : '') + '"></div>'; }).join('') + '</div>';
    stack.appendChild(slide);
  });
}
function buildTicker(){
  var items = SALES.map(function(s){
    var who = s.has_agent ? s.agent : s.role;
    return '<div class="ticker-item">' + s.address + ', ' + s.city.split(',')[0] + ' &nbsp;&nbsp; <span>' + s.price + '</span> &nbsp;&nbsp; ' + who + '</div>';
  }).join('');
  document.getElementById('tickerInner').innerHTML = items + items;
}
function goToSlide(idx){
  var prev = document.getElementById('slide-' + currentIdx);
  if (prev) prev.classList.remove('active');
  currentIdx = (idx + SALES.length) % SALES.length;
  var next = document.getElementById('slide-' + currentIdx);
  if (next) next.classList.add('active');
  if (next){ var p = next.querySelector('.slide-photo'); if (p){ p.style.animation='none'; p.offsetHeight; p.style.animation=''; } }
}
function nextSlide(){ goToSlide(currentIdx + 1); if(autoRunning) resetAuto(); }
function prevSlide(){ goToSlide(currentIdx - 1); if(autoRunning) resetAuto(); }
function resetAuto(){ clearInterval(autoTimer); autoTimer = setInterval(function(){ goToSlide(currentIdx + 1); }, SLIDE_DURATION); }
function toggleAuto(){
  var btn = document.getElementById('autoBtn');
  if (autoRunning){ clearInterval(autoTimer); autoRunning = false; btn.textContent = '▶ Play'; }
  else { resetAuto(); autoRunning = true; btn.textContent = '⏸ Pause'; }
}
buildSlides(); buildTicker(); resetAuto();
</script></body></html>
